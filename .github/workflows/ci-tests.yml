name: Automated Testing Pipeline

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore Solution
        run: dotnet restore CMP9134_FINAL_PROJECT.sln

      - name: Static Analysis
        run: dotnet format CMP9134_FINAL_PROJECT.sln --verify-no-changes --severity warn

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Dockerized Test Suite
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test-runner

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./RobotDashboard
          file: ./RobotDashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/robotdashboard-api:latest
            ghcr.io/${{ github.repository_owner }}/robotdashboard-api:${{ github.ref_name }}