name: Automated Testing Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore Dependencies
      run: dotnet restore CMP9134_final_project/CMP9134_FINAL_PROJECT.sln

    - name: Build Solution
      run: dotnet build CMP9134_final_project/CMP9134_FINAL_PROJECT.sln --no-restore

    - name: Run Tests
      run: dotnet test CMP9134_final_project/CMP9134_FINAL_PROJECT.sln --no-build --verbosity normal
