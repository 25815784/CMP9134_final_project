<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ground Control Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1f26; color: #e4e6eb; }
        .navbar { background-color: #242b33 !important; }
        .card { background-color: #2b323c; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); color: #f1f1f1; margin-bottom: 20px; }
        h4 { color: #ffffff; font-weight: 600; }
        .btn-direction { width: 80px; height: 80px; font-size: 1.5rem; margin: 5px; }
        .btn-primary { background-color: #2d6cdf; border: none; }
        .btn-info { background-color: #0dcaf0; border: none; }
        .btn-success { background-color: #2e8b57; border: none; }
        .btn-danger { background-color: #c0392b; border: none; }
        .log-box { height: 180px; overflow-y: auto; background-color: #20262e; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-3">
    <a class="navbar-brand" href="#">Ground Control</a>
    <div class="ms-auto d-flex align-items-center">
        <label for="roleSelect" class="me-2">Role:</label>
        <select id="roleSelect" class="form-select w-auto" onchange="changeRole()">
            <option value="Commander">Commander</option>
            <option value="Engineer">Engineer</option>
            <option value="Viewer">Viewer</option>
        </select>
    </div>
</nav>

<main class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3">
                <h4>Robot Status</h4>
                <p><strong>Battery:</strong> <span id="battery">--</span></p>
                <p><strong>Status:</strong> <span id="status" class="badge bg-secondary">Unknown</span></p>
                <p><strong>Position:</strong> X: <span id="posX">0</span>, Y: <span id="posY">0</span></p>
                <p><strong>Telemetry:</strong> <span id="telemetryStatus" class="badge bg-danger">Disconnected</span></p>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-3 text-center">
                <h4>Move Robot</h4>
                <div>
                    <button id="moveUp" class="btn btn-primary btn-direction" onclick="selectDir('up')">↑</button>
                </div>
                <div>
                    <button id="moveLeft" class="btn btn-primary btn-direction" onclick="selectDir('left')">←</button>
                    <button id="moveDown" class="btn btn-primary btn-direction" onclick="selectDir('down')">↓</button>
                    <button id="moveRight" class="btn btn-primary btn-direction" onclick="selectDir('right')">→</button>
                </div>
                <div class="mt-3">
                    <button id="moveBtn" class="btn btn-success px-4" onclick="confirmMove()">Confirm Move</button>
                    <button class="btn btn-danger ms-2" onclick="emergencyStop()">Emergency Stop</button>
                </div>
                <div id="feedback" class="mt-3"></div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-3">
                <h4>Sensors</h4>
                <div class="row text-center">
                    <div class="col-12">N: <span id="sN">0</span></div>
                    <div class="col-6">W: <span id="sW">0</span></div>
                    <div class="col-6">E: <span id="sE">0</span></div>
                    <div class="col-12">S: <span id="sS">0</span></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <h4>Environment</h4>
                <p><strong>Grid:</strong> <span id="mapSize">Loading...</span></p>
                <button class="btn btn-sm btn-outline-info" onclick="fetchMap()">Refresh Map</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card p-3">
                <h4>Mission Audit Log (SQL Database)</h4>
                <div id="logBox" class="log-box"></div>
            </div>
        </div>
    </div>
</main>

<script>
    let x = 0, y = 0, selectedDir = null, currentRole = "Commander";
    let ws = null;

    function showMsg(msg, type) {
        document.getElementById("feedback").innerHTML = `<div class="alert alert-${type} py-2">${msg}</div>`;
    }

    function selectDir(dir) {
        selectedDir = dir;
        document.querySelectorAll(".btn-direction").forEach(b => b.classList.replace("btn-info", "btn-primary"));
        const id = `move${dir.charAt(0).toUpperCase() + dir.slice(1)}`;
        document.getElementById(id).classList.replace("btn-primary", "btn-info");
    }

    async function confirmMove() {
        if (!selectedDir) return showMsg("Select direction!", "warning");
        let tx = x, ty = y;
        if (selectedDir === 'up') ty++; else if (selectedDir === 'down') ty--;
        else if (selectedDir === 'left') tx--; else if (selectedDir === 'right') tx++;

        if (tx < 0 || tx > 20 || ty < 0 || ty > 20) return showMsg("Out of bounds!", "danger");

        try {
            const res = await fetch(`/api/Robot/move?x=${tx}&y=${ty}`, { 
                method: 'POST',
                headers: { 'X-User-Role': currentRole }
            });
            if (res.ok) {
                showMsg("Move accepted", "success");
                setTimeout(refreshLogs, 500); // Refresh logs from DB
            }
        } catch (e) { showMsg("API Error", "danger"); }
    }

    async function refreshLogs() {
        try {
            const res = await fetch('/api/Robot/logs');
            if (res.ok) {
                const logs = await res.json();
                const box = document.getElementById("logBox");
                box.innerHTML = logs.map(l => `<div>[${new Date(l.timestamp).toLocaleTimeString()}] <span class="badge bg-info">${l.role}</span> ${l.action}</div>`).join('');
            }
        } catch (e) {}
    }

    async function updateSensors() {
        try {
            const res = await fetch('/api/Robot/sensor');
            if (res.ok) {
                const d = await res.json();
                document.getElementById("sN").innerText = d.proximity.n.toFixed(2);
                document.getElementById("sS").innerText = d.proximity.s.toFixed(2);
                document.getElementById("sE").innerText = d.proximity.e.toFixed(2);
                document.getElementById("sW").innerText = d.proximity.w.toFixed(2);
            }
        } catch (e) {}
    }

    async function fetchMap() {
        try {
            const res = await fetch('/api/Robot/map');
            if (res.ok) {
                const d = await res.json();
                document.getElementById("mapSize").innerText = `${d.width} x ${d.height}`;
            }
        } catch (e) {}
    }

    function connectWS() {
        ws = new WebSocket("ws://localhost:5000/ws/telemetry");
        ws.onopen = () => { 
            document.getElementById("telemetryStatus").className = "badge bg-success";
            document.getElementById("telemetryStatus").innerText = "Connected";
        };
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            x = d.position.x; y = d.position.y;
            document.getElementById("posX").innerText = x;
            document.getElementById("posY").innerText = y;
            document.getElementById("battery").innerText = d.battery + "%";
            const s = document.getElementById("status");
            s.innerText = d.status;
            s.className = `badge bg-${d.status === 'IDLE' ? 'success' : 'primary'}`;
        };
        ws.onclose = () => {
            document.getElementById("telemetryStatus").className = "badge bg-danger";
            document.getElementById("telemetryStatus").innerText = "Disconnected";
            setTimeout(connectWS, 3000);
        };
    }

    function changeRole() {
        currentRole = document.getElementById("roleSelect").value;
        const isViewer = currentRole === "Viewer";
        document.getElementById("moveBtn").disabled = isViewer;
        document.querySelectorAll(".btn-direction").forEach(b => b.disabled = isViewer);
    }

    function emergencyStop() { showMsg("Stop Sent", "danger"); }

    connectWS(); fetchMap(); refreshLogs(); 
    setInterval(updateSensors, 2000); 
    setInterval(refreshLogs, 5000); 
    changeRole();
</script>
</body>
</html>
