<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ground Control Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #1a1f26;
            color: #e4e6eb;
        }

        .navbar {
            background-color: #242b33 !important;
        }

        .card {
            background-color: #2b323c;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            color: #f1f1f1;
        }

        h4 {
            color: #ffffff;
            font-weight: 600;
        }

        p {
            font-size: 1rem;
            color: #d0d3d8;
        }

        .btn-direction {
            width: 90px;
            height: 90px;
            font-size: 1.6rem;
        }

        .btn-primary {
            background-color: #2d6cdf;
            border: none;
        }

        .btn-primary:hover {
            background-color: #3b7bff;
        }

        .btn-success {
            background-color: #2e8b57;
            border: none;
        }

        .btn-danger {
            background-color: #c0392b;
            border: none;
        }

        .btn-emergency {
            font-size: 1.2rem;
            padding: 15px 25px;
        }

        :focus {
            outline: 3px solid #00d9ff !important;
            outline-offset: 2px;
        }

        .log-box {
            height: 180px;
            overflow-y: auto;
            background-color: #20262e;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.95rem;
            color: #ffffff;
        }

        select.form-select {
            background-color: #2b323c;
            color: #ffffff;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark px-3">
        <a class="navbar-brand" href="#">Ground Control</a>

        <div class="ms-auto d-flex align-items-center">
            <label for="roleSelect" class="me-2">Role:</label>
            <select id="roleSelect" class="form-select w-auto" aria-label="Select user role" onchange="changeRole()">
                <option value="Commander">Commander</option>
                <option value="Engineer">Engineer</option>
                <option value="Viewer">Viewer</option>
            </select>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="row">

            <!-- ROBOT STATUS PANEL -->
            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Robot Status</h4>
                    <p><strong>Battery:</strong> <span id="battery">85%</span></p>

                    <p>
                        <strong>Status:</strong>
                        <span id="status" class="badge bg-success">Idle</span>
                    </p>

                    <p><strong>Position:</strong> X: <span id="posX">0</span>, Y: <span id="posY">0</span></p>
                    <p><strong>Direction:</strong> <span id="direction">North</span></p>
                </div>
            </div>

            <!-- CONTROL PANEL -->
            <div class="col-md-8">
                <div class="card p-3">
                    <h4>Move Robot</h4>

                    <div class="text-center mb-2">
                        <button
                            id="moveUp"
                            type="button"
                            class="btn btn-primary btn-direction"
                            aria-label="Move robot north"
                            aria-pressed="false"
                            onclick="move('up')">
                            ↑
                        </button>
                    </div>

                    <div class="text-center mb-2">
                        <button
                            id="moveLeft"
                            type="button"
                            class="btn btn-primary btn-direction me-2"
                            aria-label="Move robot west"
                            aria-pressed="false"
                            onclick="move('left')">
                            ←
                        </button>

                        <button
                            id="moveDown"
                            type="button"
                            class="btn btn-primary btn-direction me-2"
                            aria-label="Move robot south"
                            aria-pressed="false"
                            onclick="move('down')">
                            ↓
                        </button>

                        <button
                            id="moveRight"
                            type="button"
                            class="btn btn-primary btn-direction"
                            aria-label="Move robot east"
                            aria-pressed="false"
                            onclick="move('right')">
                            →
                        </button>
                    </div>

                    <div class="mt-3">
                        <button type="button" class="btn btn-success me-2" onclick="confirmMove()">Move</button>
                        <button type="button" class="btn btn-danger btn-emergency" onclick="emergencyStop()">
                            Emergency Stop
                        </button>
                    </div>

                    <div id="feedback" class="mt-3" aria-live="polite"></div>
                </div>
            </div>

        </div>

        <!-- AUDIT LOG -->
        <div class="row mt-4">
            <div class="col">
                <div class="card p-3">
                    <h4>Mission Audit Log</h4>
                    <div class="log-box" id="logBox" aria-live="polite" aria-label="Mission audit log"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let x = 0;
        let y = 0;
        let selectedDirection = null;
        let currentRole = "Commander";

        function resetDirectionButtons() {
            document.querySelectorAll(".btn-direction").forEach(btn => {
                btn.setAttribute("aria-pressed", "false");
            });
        }

        function move(direction) {
            selectedDirection = direction;

            resetDirectionButtons();

            if (direction === "up") {
                document.getElementById("moveUp").setAttribute("aria-pressed", "true");
            } else if (direction === "down") {
                document.getElementById("moveDown").setAttribute("aria-pressed", "true");
            } else if (direction === "left") {
                document.getElementById("moveLeft").setAttribute("aria-pressed", "true");
            } else if (direction === "right") {
                document.getElementById("moveRight").setAttribute("aria-pressed", "true");
            }

            showMessage(`Direction selected: ${direction.toUpperCase()}`, "info");
        }

        function confirmMove() {
            if (!selectedDirection) {
                showMessage("Please select a direction first.", "warning");
                return;
            }

            switch (selectedDirection) {
                case "up":
                    y++;
                    document.getElementById("direction").innerText = "North";
                    break;
                case "down":
                    y--;
                    document.getElementById("direction").innerText = "South";
                    break;
                case "left":
                    x--;
                    document.getElementById("direction").innerText = "West";
                    break;
                case "right":
                    x++;
                    document.getElementById("direction").innerText = "East";
                    break;
            }

            document.getElementById("posX").innerText = x;
            document.getElementById("posY").innerText = y;

            updateStatus("Moving", "primary");

            logAction(`Moved ${selectedDirection}`);
            showMessage("Move successful.", "success");

            setTimeout(() => {
                updateStatus("Idle", "success");
            }, 1500);
        }

        function emergencyStop() {
            updateStatus("EMERGENCY STOP", "danger");
            logAction("Emergency Stop Activated");
            showMessage("Emergency stop triggered!", "danger");
        }

        function updateStatus(text, type) {
            const statusElement = document.getElementById("status");
            statusElement.innerText = text;
            statusElement.className = `badge bg-${type}`;
        }

        function changeRole() {
            const role = document.getElementById("roleSelect").value;
            currentRole = role;

            if (role === "Commander") {
                enableControls(true, true);
                logAction("Switched to Commander role");
            } else if (role === "Engineer") {
                enableControls(false, true);
                logAction("Switched to Engineer role");
            } else if (role === "Viewer") {
                enableControls(false, false);
                logAction("Switched to Viewer role");
            }
        }

        function enableControls(canMove, canEmergency) {
            document.querySelectorAll(".btn-direction").forEach(btn => {
                btn.disabled = !canMove;
            });

            document.querySelector(".btn-success").disabled = !canMove;
            document.querySelector(".btn-danger").disabled = !canEmergency;
        }

        function logAction(message) {
            const logBox = document.getElementById("logBox");
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `<div>[${time}] ${message}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function showMessage(message, type) {
            document.getElementById("feedback").innerHTML =
                `<div class="alert alert-${type}" role="alert">${message}</div>`;
        }

        changeRole();
    </script>

</body>
</html>
